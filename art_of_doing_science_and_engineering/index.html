t we now call a production line. Venice needed to build ships quickly, reliably, and at scale. The Arsenal standardized parts, divided labor, and established processes that allowed a complete warship to be fitted out in a single day. This was systems thinking before the term existed: treating the entire shipbuilding operation as an integrated whole to be optimized, not as a collection of separate crafts."}, {"heading": "The Telephone Company as Systems Pioneer", "body": "Hamming argues that the telephone company was among the first organizations to engage in true modern systems engineering. A telephone call travels through an enormous chain of equipment, software, and human processes — any failure anywhere in that chain breaks the connection. Designing, building, operating, and maintaining such a system required thinking about the whole at every stage. No single component could be optimized in isolation; every design decision had to consider its effect on everything connected to it."}, {"heading": "Rule 2: Design for Graceful Change", "body": "The second major principle of systems engineering: a well-designed system should accommodate change gracefully. Requirements change, technology changes, usage patterns change. A system that can only work under its original specifications will be brittle — any deviation from the design conditions causes failure. A robust system anticipates that the real world will not match the specifications and builds in the ability to adapt, degrade gracefully under stress, and recover."}, {"heading": "Rule 3: Near-Spec Performance Is Worst Under Overload", "body": "A counterintuitive but important principle: a system operating near its specification limit performs worse when overloaded than one operating with more margin. The reason is that fine-tuned systems have less slack — less room to absorb excess demand before collapsing. The Nike missile system illustrates this: originally designed to solve the problem of intercepting a single incoming missile, it evolved into an entire air-defense philosophy as the threat environment changed. The system designers had to continuously reconceptualize what the system was for."}, {"heading": "Systems Engineering Is Never Done", "body": "The most important and humbling aspect of systems engineering: the solution changes the environment. When you solve a problem within a system, the solution alters how the rest of the system behaves, which creates new problems. The telephone system, once deployed, made possible forms of commerce and communication that created entirely new demands on the telephone system. A system is never finished — it must be continuously rethought as it changes the world it was built to serve. This is not a flaw; it is the nature of all significant engineering. Systems engineering requires holding the whole system in mind at all times. The cathedral-builder, not the stone-cutter, is the model to follow."}],
  },
  29: {
    emoji: '📏',
    title: 'You Get What You Measure',
    elem: [{"heading": "The Net With Big Holes", "body": "Imagine using a fishing net with big holes to catch ocean animals and study them. After catching things for a whole year, you say: 'I've studied all ocean life! Nothing is smaller than six inches.' But wait — all the tiny fish just swam right through the holes! The net only caught big things, so that's all you studied. This is the problem Hamming talks about: sometimes the tool you use to measure something decides what you find — not the truth."}, {"heading": "You Get What You Measure", "body": "If a teacher gives gold stars for finishing worksheets fast, students learn to rush. If a teacher gives gold stars for asking good questions, students learn to think carefully. Whatever you reward — that's what you get more of. This is true in science, in business, in school, and in life. So before measuring something, ask: what will people do differently when they know this is how they're being judged? Choose your measurements wisely — because whatever you measure, people will work hard to improve that specific thing."}, {"heading": "Think About What You're Really Measuring", "body": "The big lesson from this chapter: think hard about what your measuring tool actually measures. A test might measure how well students memorize, not how well they understand. A timer might measure speed, not quality. A count of pages written might measure length, not greatness. Always ask: does this measurement capture the thing I actually care about?"}],
    middle: [{"heading": "The Fishing Net Problem", "body": "Imagine a scientist who studies ocean life using a net with two-inch holes. After studying everything the net catches, the scientist concludes that nothing in the ocean is smaller than two inches. But of course — everything smaller just slipped through the net! The measuring tool itself determined what could be found. This is the core idea of this chapter: what you choose to measure shapes what you see — and what you miss."}, {"heading": "Rating Systems Change What People Do", "body": "When people know they are being rated on something, they start optimizing for that rating instead of for what the rating is supposed to measure. If your performance review rewards playing it safe, people stop taking risks — even good risks that could lead to breakthroughs. The rating system was supposed to measure quality, but it ended up measuring caution. When a measure becomes a target, it stops being a good measure. People change their behavior to look good on the measurement instead of actually doing good work."}, {"heading": "IQ Scores: Built to Be Bell-Shaped", "body": "IQ tests are often used as if they reveal something fundamental about human intelligence. But Hamming points out that IQ tests are designed and adjusted to produce a bell-curve shape in the results. The bell curve isn't a discovery about intelligence — it's baked into the test design. What looks like a finding about the world is actually a reflection of choices made when building the measuring tool."}, {"heading": "In software development, managers sometimes measured how productive programmers were by", "body": "counting lines of code they wrote. This sounds sensible. But programmers quickly learned that writing more lines — even unnecessary, bloated code — would earn them better reviews. The measurement was supposed to track productivity. Instead, it created an incentive to write worse code. You get what you measure."}, {"heading": "Think Carefully About What You Measure", "body": "Every time you design a way to measure something — whether it's student performance, employee productivity, or scientific results — you need to ask: What behavior does this measurement encourage? What does it miss? What will people do differently when they know this is how they're being judged? Good measurement design is just as important as good experimental design."}],
    high: [{"heading": "Eddington's Fishing Net", "body": "The astronomer Arthur Eddington offered a parable about a scientist who studies the ocean using a net with a two-inch mesh. After examining everything caught, the scientist concludes that nothing in the ocean is smaller than two inches. The conclusion follows perfectly from the data — and yet is almost certainly wrong. Every measurement system has a 'mesh size': the nature of your measurement tool determines what you can detect, and what you cannot. This is Hamming's opening frame for the chapter's central principle: you get what you measure, not necessarily what matters."}, {"heading": "Rating Systems and Selection Bias", "body": "Hamming describes how performance rating systems shape the people they are designed to evaluate. If a rating system starts nearly everyone at 95% and treats anything below that as poor performance, it selects for conservatism — people learn not to take risks, because any failure is magnified. The system measures caution and conformity, labels that as excellence, and thereby produces a workforce of careful people who avoid the bold moves that lead to genuine breakthroughs. You designed a measure for quality; you got a measure for risk aversion. When people know what is being measured, they optimize for the measurement — not necessarily for the underlying thing the measurement was supposed to represent."}, {"heading": "IQ and the Normal Distribution", "body": "The apparent fact that IQ scores follow a normal distribution (the classic bell curve) is often cited as evidence about the fundamental nature of human intelligence. Hamming points out the circularity: IQ tests are calibrated and adjusted specifically so that the resulting scores follow a normal distribution. The normal distribution is an artifact of the test-design process, not a finding about intelligence. What we think we discovered about the shape of human intelligence is actually a reflection of the choices made when building the measurement tool."}, {"heading": "Exam Grade Distributions", "body": "The distribution of grades on an exam is similarly an artifact of how the exam was designed. An easy exam clusters scores at the high end; a hard exam clusters them at the low end; a carefully calibrated exam produces whatever distribution the designer intended. Students and administrators often treat grade distributions as informative data about student ability, when they are equally — or more — informative about exam design choices."}, {"heading": "Dynamic Range: Using the Full Scale", "body": "A practical insight from measurement theory: evaluators who cluster their ratings in the middle of a scale (giving most things 5–7 on a 1–10 scale) are effectively throwing away most of the information their scale could carry. The choice of how to use a rating scale has more effect on what the ratings reveal than small differences in what is being rated. A rater who uses the full dynamic range of a scale produces far more useful distinctions than one who clusters all their ratings in a narrow band."}, {"heading": "Lines of Code as a Software Metric", "body": "A famous example from software engineering: measuring programmer productivity by lines of code written. The logic seems intuitive — more code, more work done. But the moment this metric is used to evaluate or reward programmers, behavior changes. Programmers have an incentive to write verbose code, avoid elegant abstractions, and expand their output with unnecessary lines. The metric was intended to measure productivity; it ended up incentivizing bloat. You get what you measure."}, {"heading": "Military Readiness Reports", "body": "Hamming observed in military contexts that readiness reports routinely described capabilities that did not match reality. Ships and units prepared intensively for scheduled inspections, producing inspection results that were genuinely good — but those results reflected inspection preparation, not actual operational readiness on a random day. Commanders knew this; upper management often did not. The measure was honest in a narrow sense; it was misleading in the broader sense that mattered."}, {"heading": "Capability vs. Probability", "body": "A deeper problem with measurements that travel up chains of command: what begins as an evaluation of a specific capability at one level gets reinterpreted as a probability or a general assessment at higher levels. A report stating 'we can do X under these conditions' becomes, several levels up the hierarchy, 'they can do X' — the conditions disappear. The measurement is not wrong at its source; it is misread at its destination. Designing measurements that survive this transformation accurately is one of the hardest problems in organizational management. You get what you measure. Design your measurements carefully, or you will optimize for the wrong thing and call it success."}],
  },
  30: {
    emoji: '🌟',
    title: 'You and Your Research',
    elem: [{"heading": "Work on Things That Matter", "body": "In his very last chapter, Hamming gives advice for having a great life doing science or engineering. His most important piece of advice: work on things that really matter, not just things that are easy. Important problems are harder, but they are the ones where your work can truly make a difference."}, {"heading": "Be Ready for Lucky Moments", "body": "Great scientists are often in the right place at the right time — but that's partly because they were prepared. When a lucky moment came, they recognized it because they had been thinking hard about that problem for a long time. You can't always control luck, but you can control how ready you are when luck arrives. Chance favors the prepared mind. The more you learn and think, the more you will recognize important opportunities when they appear."}, {"heading": "Stay Curious Your Whole Life", "body": "The best scientists and engineers never stop asking questions, never stop learning, and never stop wondering. Hamming's final message to readers is simple: think carefully about how you work and why you work that way. Keep asking: am I working on something important? Am I staying curious? Am I being brave enough to try new ideas? That habit of asking questions about your own work is the most important thing you can take from this book."}],
    middle: [{"heading": "How to Do Work That Matters", "body": "In his final chapter, Hamming gives direct advice about how to have a great career in science or engineering. Not just a good career — a genuinely great one where you contribute something that really matters. His main message: it isn't purely about being talented. It's about how you work, what you choose to work on, and the habits you build over many years."}, {"heading": "Luck Favors the Prepared", "body": "Great researchers often appear to be lucky — they are at the right place at the right time. But Hamming noticed that they were ready for that lucky moment. An opportunity walked past many people; the prepared person saw it and grabbed it. You can't control luck, but you can control how prepared you are."}, {"heading": "Work on Important Problems", "body": "Hamming asked his colleagues: what are the most important open problems in your field? Then he asked: why aren't you working on them? Most people chose safe, easy problems that would definitely produce results. But if you never work on important problems, you have almost no chance of doing important work. Hamming kept a mental list of the biggest open questions in his field so he was always ready to recognize a relevant opportunity. If you do not work on important problems, it is unlikely you will do important work. Ask yourself: what actually matters in what I am studying?"}, {"heading": "Great Researchers Are Not One-Hit Wonders", "body": "Shannon invented Boolean circuit design and the entire theory of information. Einstein produced five landmark papers in a single year. Newton said that if others thought as hard as he did, they would get similar results. Great researchers do great things repeatedly because they have built sustained habits of hard thinking — not because they had one brilliant idea by accident."}, {"heading": "Keep an Open Door", "body": "Hamming noticed that researchers who kept their office doors open — who stayed connected to their colleagues and the problems of the broader organization — tended to do more important work than those who shut themselves away to focus. Being isolated may feel more efficient, but it disconnects you from the real problems that matter."}, {"heading": "Learn to Communicate Your Work", "body": "Doing great work isn't enough on its own. You have to be able to explain it — to your boss, to colleagues outside your field, in a written report, in a short conversation. Hamming says this is not a minor skill. It determines whether your work reaches the people who can act on it. Practice explaining your ideas clearly, simply, and persuasively."}, {"heading": "Style Is the Real Lesson", "body": "Hamming ends the entire book with this idea: the style of how you work matters more than the specific technical facts you learn. The facts will change. The tools will change. But how you approach problems, how you think, how you stay curious and courageous — that is what will carry you through your whole career. Examine your habits. Think about how you work. That is Hamming's parting message."}],
    high: [{"heading": "The Final Lecture", "body": "This final chapter of Hamming's course is in some ways the most personal — a direct address to the reader about how to conduct a great scientific or engineering career. It draws together everything that has come before and asks: given all we have discussed, how should you live your professional life? How do you increase the odds that you will do genuinely important work, not just competent work? The question is not about talent alone; it is about how you think, what you work on, and the habits and attitudes you cultivate over decades."}, {"heading": "Luck Favors the Prepared Mind", "body": "Hamming shared an office with Claude Shannon at Bell Labs. He knew many of the great figures of his era personally. One observation he returns to repeatedly: great scientists are often in the right place at the right time — but that is not mere luck. The prepared mind recognizes an opportunity that an unprepared mind walks past. Pasteur's famous observation applies here: chance favors the prepared mind. You cannot control luck, but you can control your preparation."}, {"heading": "Hamming noticed that great scientists and engineers are not one-hit wonders. Shannon", "body": "contributed both his Boolean algebra thesis — which showed that circuit design could be done with Boolean logic — and, later, the entire mathematical theory of information. Einstein's 'miraculous year' of 1905 produced not one but five landmark papers across multiple domains. Newton, when asked how he had done so much, said: 'If others would think as hard as I did, they would get similar results.' Greatness is not a single flash; it is a sustained habit of mind. Great researchers are not distinguished primarily by their talent. They are distinguished by their drive, their focus on important problems, and their willingness to keep thinking hard."}, {"heading": "Work on Important Problems", "body": "Hamming asked his colleagues at lunch: what are the most important problems in your field? And then: why aren't you working on them? The answer was usually that important problems are hard, risky, and might not yield results. Safe, publishable, incremental work is more comfortable. But Hamming's argument is that if you are not working on important problems, your chances of doing important work are essentially zero. He kept a mental list of ten to twenty important open problems in his field at all times, so that when an opportunity arose, he could recognize its relevance immediately."}, {"heading": "Bill Pfann and Zone Melting", "body": "One of Hamming's most striking illustrations: Bill Pfann was developing a technique called zone melting — a method for purifying semiconductor materials. His local management dismissed the work. Hamming recognized its potential, helped Pfann prepare a proper presentation, and facilitated the work getting the attention it deserved. Zone melting became critically important to the semiconductor industry. The story illustrates several things at once: important work can go unrecognized for purely social reasons; advocates matter; and even Hamming himself, not being directly in the field, could see what insiders missed."}, {"heading": "Courage and the Willingness to Say Something", "body": "Shannon once told Hamming: 'I ain't scaird of nothing.' Hamming cites this as an essential quality of great researchers. The willingness to voice an unorthodox idea in a meeting, to push back on the consensus view, to stake out a position that might be wrong — these require a form of intellectual courage that many technically talented people lack. Hamming is not praising recklessness; he is praising the willingness to commit to an idea, defend it, and be willing to be wrong rather than safe."}, {"heading": "The Open Door vs. the Closed Door", "body": "Hamming made a quiet observation over many years: people who kept their office doors open were interrupted more, knew more about what was going on, and were more likely to do important work. People who kept their doors closed produced a lot of work but it was often less significant because it was disconnected from the real problems of the organization. A closed door says 'I am more efficient'; an open door says 'I am part of something larger.' The correlation, while not absolute, was real."}, {"heading": "Friday Afternoon Great Thoughts", "body": "Hamming set aside Friday afternoons as time for what he called 'great thoughts' — thinking about where his field was going, what the big open questions were, and how his work connected to the larger picture. This was not productive time in the ordinary sense; no papers were written, no immediate deliverables produced. But Hamming credits this habit with some of his most important insights. Strategic thinking requires stepping away from the immediate and looking at the horizon."}, {"heading": "Tolerance of Ambiguity", "body": "One psychological trait that consistently separated the researchers who did great work from those who did good work: the ability to hold an unresolved problem in mind without forcing a premature solution. Great researchers could live with not knowing, keep the question alive and active, and wait for the right insight rather than settling for the first adequate answer. This tolerance of ambiguity is uncomfortable; most people resolve it prematurely by either abandoning the problem or accepting an insufficient answer. Cultivating the capacity to stay with an open question is a learnable skill. Invert the problem. Some problems become far easier when approached from the opposite direction. Hamming's insight into symbolic programming came from asking: 'What is the inverse of this process?'"}, {"heading": "Selling Your Ideas", "body": "Technical excellence is necessary but not sufficient. You must also be able to communicate your work — through formal presentations, written reports, and informal conversations — in a way that reaches people who don't already share your technical background. Hamming was explicit about this: the packaging of an idea affects whether it reaches the people who can act on it. Oral presentations require clarity and structure. Written reports require precision and readability. Informal hallway conversations require the ability to make a complex idea accessible in two minutes. All three matter."}, {"heading": "Style Is the True Content", "body": "Hamming closes the entire course with a claim that may surprise: style is the true content. By this he means that the ways you approach problems, think about your field, interact with colleagues, carry yourself through a career — the style of your intellectual and professional life — is not window dressing on top of the real substance. It is the substance. The specific technical content he has covered will become outdated; the fields will change; the tools will change. But the habits of mind — the style — will carry you through any number of paradigm shifts. Socrates said 'The unexamined life is not worth living.' Hamming applies this to the professional life: examine how you work, why you work that way, and whether that is how you want to work."}],

};

  [6, '🤖', 'Artificial Intelligence — Part I'],
  [7, '🧠', 'Artificial Intelligence — Part II'],
  [8, '🔬', 'Artificial Intelligence — Part III'],
  [9, '📐', 'n-Dimensional Space'],
  [10, '🔢', 'Coding Theory — Part I'],
  [11, '📊', 'Coding Theory — Part II'],
  [12, '🛡️', 'Error-Correcting Codes'],
  [13, '📡', 'Information Theory'],
  [14, '🎵', 'Digital Filters — Part I'],
  [15, '🎶', 'Digital Filters — Part II'],
  [16, '🌊', 'Digital Filters — Part III'],
  [17, '🔊', 'Digital Filters — Part IV'],
  [18, '🎯', 'Simulation — Part I'],
  [19, '🎲', 'Simulation — Part II'],

  [23, '∑', 'Mathematics'],

  [25, '✨', 'Creativity'],
  [26, '👔', 'Experts'],
  [27, '📉', 'Unreliable Data'],

];

// ── STATE ─────────────────────────────────────────────────────────────
let currentLevel = 'elem';
let currentChapter = 1;

// ── RENDER SIDEBAR ───────────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('ch-list');
  list.innerHTML = CH_LIST.map(([n, emoji, title]) => `
    <div class="ch-item ${n === currentChapter ? 'active' : ''}"
         onclick="goToChapter(${n})" id="si-${n}">
      <span class="ch-emoji">${emoji}</span>
      <span class="ch-label">
        <span class="ch-num">Chapter ${n}</span>
        <span class="ch-name">${title}</span>
      </span>
    </div>
  `).join('');
}

// ── RENDER ALL CHAPTER VIEWS ─────────────────────────────────────────
function renderChapters() {
  const container = document.getElementById('chapters-container');
  container.innerHTML = CH_LIST.map(([n, emoji, title]) => {
    const data = BOOK[n];
    const sections = data[currentLevel] || [];
    const sectionsHtml = sections.map(s => {
      const heading = s.heading
        ? `<div class="section-heading">${escHtml(s.heading)}</div>` : '';
      const body = s.body
        ? `<div class="section-body">${escHtml(s.body)}</div>` : '';
      return `<div class="section">${heading}${body}</div>`;
    }).join('');

    const prevBtn = n > 1
      ? `<button class="ch-nav-btn prev" onclick="goToChapter(${n-1})">← Chapter ${n-1}</button>`
      : '';
    const nextBtn = n < 30
      ? `<button class="ch-nav-btn next" onclick="goToChapter(${n+1})">Chapter ${n+1} →</button>`
      : '';

    return `
      <div class="chapter-view ${n === currentChapter ? 'visible' : ''}" id="cv-${n}">
        <div class="ch-header">
          <span class="ch-hero-emoji">${emoji}</span>
          <span class="ch-hero-num">Chapter ${n} of 30</span>
          <div class="ch-hero-title">${escHtml(title)}</div>
          <div class="ch-divider"></div>
        </div>
        <div class="sections">${sectionsHtml}</div>
        <div class="ch-nav">${prevBtn}${nextBtn}</div>
      </div>`;
  }).join('');
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── NAVIGATION ────────────────────────────────────────────────────────
function goToChapter(n) {
  // Hide old
  const old = document.getElementById(`cv-${currentChapter}`);
  if (old) old.classList.remove('visible');
  const oldSi = document.getElementById(`si-${currentChapter}`);
  if (oldSi) oldSi.classList.remove('active');

  currentChapter = n;

  // Show new
  const cur = document.getElementById(`cv-${n}`);
  if (cur) cur.classList.add('visible');
  const curSi = document.getElementById(`si-${n}`);
  if (curSi) {
    curSi.classList.add('active');
    curSi.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  // Scroll main to top
  document.getElementById('main').scrollTop = 0;

  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
  updateProgress();
}

// ── LEVEL SWITCH ──────────────────────────────────────────────────────
function setLevel(lv) {
  if (lv === currentLevel) return;
  currentLevel = lv;

  // Update body class
  document.body.className = lv;

  // Update buttons
  document.querySelectorAll('.lbtn').forEach(b => {
    b.classList.toggle('active', b.dataset.lv === lv);
  });

  // Re-render all chapter content
  renderChapters();

  // Scroll main to top
  document.getElementById('main').scrollTop = 0;
  updateProgress();
}

// ── PROGRESS BAR ─────────────────────────────────────────────────────
function updateProgress() {
  const main = document.getElementById('main');
  const pct = main.scrollHeight <= main.clientHeight
    ? 100
    : (main.scrollTop / (main.scrollHeight - main.clientHeight)) * 100;
  document.getElementById('progress').style.width = pct + '%';
}

// ── SIDEBAR TOGGLE (mobile) ───────────────────────────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ── KEYBOARD NAV ─────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    if (currentChapter < 30) goToChapter(currentChapter + 1);
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    if (currentChapter > 1) goToChapter(currentChapter - 1);
  }
});

// ── INIT ──────────────────────────────────────────────────────────────
renderSidebar();
renderChapters();
</script>
</body>
</html>
