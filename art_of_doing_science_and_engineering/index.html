    high: [{"heading": "Fix Your Weaknesses Before They Fix You", "body": "Hamming opens this chapter with a personal story that has almost nothing to do with computers — and everything to do with career strategy. Despite being a confident teacher and one of Bell Labs' most respected scientists, he discovered in the 1950s that he was terrified of giving talks to large public audiences. Stage fright. His response is worth studying. He didn't just accept it as a personality trait. He reasoned that a scientist has three essential communication duties: writing papers, giving prepared talks, and speaking improvtu. Being unable to do any one of them would be a serious, possibly career-defining, limitation. So he decided to fix it — through deliberate practice. When IBM invited him to give an evening talk to a group of computing customers, he jumped at it. His goal wasn't just to give one good talk — it was to give a talk good enough to get invited back, so he could practice again. He gave that talk, called 'The History of Computing to the Year 2000,' two or three times a year for many years. It cured his stage fright. It kept him up to date with computing trends. And it forced him to think seriously about the future he was helping to build. The lesson Hamming draws: identify the things that will hold you back and deliberately attack them. Don't wait for the problem to disappear on its own."}, {"heading": "Give Talks the Audience Wants to Hear", "body": "Preparing for that first talk, Hamming realized something that sounds obvious but is frequently violated: the audience doesn't care what topic is interesting to you. They care what's interesting to them. A scientist's temptation is to lecture people on their own specialty — the thing they know most deeply. But this is often the wrong choice. Hamming picked 'the history of computing' because it was genuinely interesting to nearly anyone in that room, regardless of their background, and because it was something he himself wanted to understand better. He draws a careful line between entertainment and communication. A good scientific talk isn't just entertaining — it transmits real understanding from the speaker to the audience. Humor helps, but it's a means, not an end. The goal is always that the audience leaves knowing something true and useful that they didn't know before."}, {"heading": "Looking back at how computers gained acceptance, Hamming notices a consistent pattern:", "body": "new tools have to prove themselves on the most demanding problems first before anyone will let them near the routine, practical work. At Los Alamos, early computers tackled partial differential equations for the atomic bomb — among the hardest calculations then known — on primitive equipment. That was necessary: only by demonstrating the machine could do something impossible to do by hand could you build the credibility to use it for everything else. Once computing proved itself on heroic tasks, the door opened to simpler, more economically valuable work."}, {"heading": "Hamming frames this as a general principle for any innovation:", "body": "It is first necessary to prove beyond any doubt the new thing can cope with heroic tasks before it can get into the system to do the more routine, and in the long run, more useful tasks. If you have a genuinely new idea, expect stout resistance. That resistance doesn't mean your idea is wrong — it's the normal cost of entry. The question to ask yourself is whether the idea is worth fighting for. If it is, commit to demonstrating it on a problem so hard that nobody can dismiss the result. If it isn't, spend your energy elsewhere."}, {"heading": "Computers Enable Equivalent Jobs, Not the Same Jobs", "body": "One of the most practically important observations in this chapter is deceptively simple: when you introduce a computer into a workflow, you almost never end up doing the same job you were doing before, only faster. You end up doing an equivalent job — one that produces the same essential value, but approached in a fundamentally different way."}, {"heading": "Hamming saw this repeatedly. When computers entered Bell Labs' cyclotron experiments", "body": "at Brookhaven, they were brought in just to gather and display data in real time. But their presence gradually changed the experiments themselves. Scientists could now abort runs mid-stream when something looked wrong, redirect in real time, and redesign experiments far more rapidly than before. The computer didn't just speed up the old way of doing cyclotron experiments — it changed what a cyclotron experiment was. The Boeing story makes the same point in reverse. Boeing tried to maintain a shared real-time database of the current aircraft design, so all engineering teams would always be working from the same version. In theory, brilliant. In practice, it collapsed. When you're optimizing one subsystem and someone else is simultaneously changing another, you can't tell if your improvement is real or just a response to their change. Every team ended up making a snapshot copy of the database and working from that — defeating the whole purpose."}, {"heading": "The insight that unlocked Hamming's understanding of where computing was headed was", "body": "this: computers make possible the mass production of a variable product. Traditional mass production works by producing the same thing over and over at low cost — a Ford Model T, a standardized screw. The efficiency comes from sameness."}, {"heading": "Computers break this tradeoff. With software, you can produce something different for", "body": "each customer — a customized tax return, a personalized news feed, a uniquely configured computer — using the same underlying machine. The variation moves from hardware to software, and software is infinitely reproducible at near-zero marginal cost. This is why computers penetrated every industry that Hamming predicted they would: each application is just a program — a new set of instructions on the same general-purpose hardware. The INTEL 4004, the world's first microprocessor, replaced racks of custom circuits with a tiny chip and a program. Four-bit chips became 8-bit, then 16, then 64. And today Hamming's prediction is visible in every elevator, stoplight, washing machine, and phone."}, {"heading": "The S-Curve of Applications — and What Comes Next", "body": "Hamming maps the history of computing applications as a series of overlapping S-curves. First came pure scientific number crunching — only organizations with large budgets could afford it, so it was naturally limited. When costs fell, engineering applications piled on top."}, {"heading": "Then military work. Then symbol manipulation: word processing, compilers, business", "body": "systems. Each wave followed its own S-curve, leveling off as it reached saturation — but each new wave launched while the previous one was still growing, keeping the overall rate of adoption roughly constant for decades. Where does the next wave come from? Hamming points to pattern recognition — speech recognition, image analysis, factory scheduling — and beyond that, artificial intelligence, which he believes will eventually deliver on its long-promised potential. Virtual reality is another candidate he names, noting its obvious economic value in both practical and entertainment applications."}, {"heading": "The broader lesson: the applications of any general-purpose technology don't saturate at", "body": "once. They saturate domain by domain, and the total growth curve stays healthy as long as new domains keep entering the adoption phase."}, {"heading": "Always Design for Field Maintenance", "body": "Hamming ends the chapter with a practical engineering principle he returns to repeatedly throughout the book: design for how things will actually be maintained in the field, not how you wish they would be maintained. In the real world, the people maintaining a deployed system are usually not the people who designed it, they're working under time pressure, they don't have full documentation, and they're often in difficult conditions. If your design assumes careful, knowledgeable maintenance, it will fail in practice. If it's designed to survive rough handling and partial understanding, it has a chance. This principle applies to software as much as hardware, and to organizations as much as machines. The system that succeeds long-term is rarely the one that was optimal at launch — it's the one that was honest about how messy the real world is and designed accordingly."}],
  },
  6: {
    emoji: '🤖',
    title: 'Artificial Intelligence — Part I',
    elem: [{"heading": "The Art of Doing Science and Engineering", "body": "Can Computers Think? This is the big question in Chapter 6, and Hamming wrote it in 1997 — before most of you were born, and long before ChatGPT, Siri, or any of the AI tools you might already use today. His honest answer: we don't know — because we can't even agree on what 'thinking' means. Does a calculator think when it adds numbers? Does a dog think when it learns a trick? Does a chess program think when it beats a grandmaster? These aren't trick questions. They're genuinely hard. And the answer matters — because how you think about AI will shape what you do with it (and what you let it do to you) throughout your entire life."}, {"heading": "Why Rules Weren't Enough", "body": "The first big idea in AI was to give computers rules. Write down enough rules, and the computer could think! Researchers started with 5 rules, then 50, then 500, then 5,000. None of it quite worked. The problem? Real expertise isn't rules. A doctor who's seen thousands of patients doesn't consciously run through a checklist — they use a feeling built up over years that's very hard to put into words. The solution that finally worked: instead of writing rules, show the computer millions of examples and let it figure out the patterns itself. This is called machine learning. Today's AI chatbots were trained on enormous amounts of text — more than any human could read in their entire life — and they learned to predict what words come next. Amazingly, that turns out to produce something that looks a lot like understanding. Instead of teaching AI the rules, we showed it billions of examples and let it learn."}, {"heading": "AI and Games: Testing What Machines Can Do", "body": "Games are a great way to test AI because the rules are clear and you always know who wins. Chess was the classic test. In 1997 — the same year Hamming wrote this chapter — a computer called Deep Blue beat the world chess champion Garry Kasparov. It wasn't 'smart' the way a human is smart; it just calculated millions of moves per second until it found good ones. Then in 2016, an AI called AlphaGo beat the world's best player at a much harder game called Go. That one was special because Go has more possible positions than atoms in the universe — you can't just calculate your way through it. AlphaGo had to develop something closer to intuition, by playing millions of games against itself. Its successor, AlphaZero, learned chess, Go, and another game all by itself — starting from nothing but the rules — in under 24 hours. It became the greatest chess player in history without studying a single human game. Chess grandmasters said its style looked 'alien.'"}, {"heading": "AI Today: Amazing — and Still Surprising Us", "body": "Today's AI can write stories, answer science questions, help doctors, create art, and write computer programs. In 2024, some AI chatbots could fool people into thinking they were talking to a real human — even better than most actual humans could! But AI still makes mistakes — sometimes confidently wrong ones. It can produce answers that sound completely right but are totally made up. It can pass tests but fail at common sense. We built it, but we don't fully understand how it works inside."}, {"heading": "Hamming's advice from 1997 still fits perfectly:", "body": "Don't believe AI is all-powerful. Don't dismiss it either. Watch it carefully, and think for yourself. The most important thing isn't whether a machine can think. The most important thing is that YOU learn to think — clearly, carefully, and with good judgment. That's something no AI has truly figured out how to replace."}],
    middle: [{"heading": "The Art of Doing Science and Engineering", "body": "The Big Question: Can Machines Think?"}, {"heading": "Hamming wrote this chapter in 1997 — before Google, before smartphones, before", "body": "ChatGPT. But the question he wrestles with is one you've probably already asked yourself: can a computer actually think? His honest answer is: we don't really know, because we can't even agree on what 'thinking' means. He prefers to reframe the question more usefully: which of the things humans find difficult or exhausting can machines do instead? That question has a clearer answer, and the answer changes every few years as technology advances. He also makes a subtle but important point: computers manipulate symbols — they shuffle patterns around according to rules. Whether that produces genuine understanding or just a very good simulation of it is something even the world's leading AI researchers debate today."}, {"heading": "Why Rule-Based AI Hit a Wall", "body": "The first major approach to AI was to write rules. If you could just give a computer enough rules, the thinking would follow. In 1950, researchers thought five general rules might be enough to solve any problem. When that failed, they tried fifty. Then five hundred. By the"}, {"heading": "1980s, so-called 'Expert Systems' used thousands of rules extracted from interviews with", "body": "doctors, engineers, and other specialists. But it kept failing. Hamming explains why: when you ask an expert how they think, they can only describe the surface level — the conscious part. The real skill is buried in years of unconscious pattern recognition. A doctor diagnosing a patient isn't consciously running through a checklist; they're drawing on thousands of cases they've seen, using intuition they can't easily put into words. You can't capture that by writing rules."}, {"heading": "The breakthrough came when researchers stopped asking humans for rules and instead", "body": "gave computers massive amounts of data and let them find the patterns themselves. This is called machine learning — and its most powerful form today, deep learning, powers everything from face recognition to large language models like ChatGPT, Claude, and Gemini. Instead of teaching AI to follow rules, we taught it to learn from examples — billions of them."}, {"heading": "Games: Where AI Proved Itself", "body": "Hamming explains why researchers used games to test AI: a game has clear rules and a clear winner, so there's no argument about whether the AI succeeded. Chess was the big target. In 1958, two famous AI researchers predicted a computer would be world chess champion within ten years. It actually took nearly forty. IBM's Deep Blue defeated world champion Garry Kasparov in 1997 — the same year Hamming was writing this. Deep Blue was powerful but not truly 'intelligent' — it worked by brute-force calculation, checking hundreds of millions of positions per second."}, {"heading": "Then came something more striking. In 2016, DeepMind's AlphaGo defeated the world's", "body": "best Go player. Go was considered much harder than chess, because the number of possible positions is larger than the number of atoms in the universe. Brute force can't crack it. AlphaGo had to develop something more like intuition, using neural networks trained by playing millions of games against itself. Its successor, AlphaZero, taught itself chess, Go, and another game called shogi — from scratch, using only the rules — in less than 24 hours. It became the best player in history at all three. Chess grandmasters described its style as 'alien' — it found strategies no human had ever considered."}, {"heading": "The Turing Test — and What Happened When AI Took It", "body": "Alan Turing proposed a famous test in 1950: if you can't tell whether you're chatting with a human or a computer, the computer has passed. For decades this seemed safely out of reach. In 2024, researchers ran a careful version of the test. GPT-4.5 — one of OpenAI's large language models — was judged to be human 76% of the time by the people it was chatting with. Meta's LLaMA 3.1 also passed in similar conditions. Both did better at seeming human than many actual humans in the same study. But does passing the Turing Test mean the AI is actually thinking? Most researchers say no — or at least, not necessarily. These systems are extraordinarily good at producing human-sounding text, because they were trained on essentially every book, article, and conversation ever published. That's pattern-matching at an enormous scale. Whether it involves genuine understanding or experience — that question remains open. Hamming predicted in 1997 that 'thinking' was probably not yes-or-no, but a matter of degree. That idea looks increasingly correct."}, {"heading": "What Hamming Got Right", "body": "Hamming was writing in 1997, almost thirty years ago. Looking back, his scorecard is impressive: He was right that rule-based AI would hit a wall. He was right that AI would eventually deliver on its promises — but that timelines would keep slipping. He was right that thinking is probably a matter of degree, not a switch. And he was right that you can't afford to ignore AI — but you also can't blindly trust it. What he couldn't predict was the neural network revolution — specifically, the transformer architecture that underlies today's large language models. These systems don't follow rules; they encode knowledge as billions of numerical weights, shaped by training on more text than any human could read in a thousand lifetimes. Current AI is astonishing — and still limited in important ways. It confidently gives wrong answers, struggles with genuine reasoning, and we still don't fully understand how it works internally. In that sense, Hamming's core warning still stands: don't believe or disbelieve too firmly. Pay close attention, and think for yourself. \"You cannot afford to either believe or disbelieve — you must come to your own terms with the problem.\" — Hamming, 1997"}],
    high: [{"heading": "The Art of Doing Science and Engineering", "body": "The Core Question: Can Machines Think? Hamming wrote this chapter in 1997, near the very beginning of what would become one of the most consequential debates of our era. The question he frames — 'Can machines think?' — is still not definitively answered today, even though AI systems in 2025 can write novels, debug code, pass medical licensing exams, and hold extended conversations indistinguishable from human ones. Hamming's first move is to reframe the question. Rather than asking 'Can machines think?' he prefers: 'Of all of life's burdens, which can machines relieve or significantly ease for us?' This is a more practical and more honest framing. It shifts focus from a philosophical puzzle to an engineering question — what can we actually build, and what human effort can it replace? He also points out early on that computers manipulate symbols, not information. We use the word 'information' as if it has a crisp, programmable definition — but try writing a precise definition of what 'information' means and you'll quickly find it's slippery. This observation is still relevant today: modern AI systems process tokens and patterns in data, but whether they truly 'understand' anything in the way a human does remains deeply contested."}, {"heading": "From Five Rules to Five Thousand — and Then a Different Path", "body": "The early history of AI is a story of ambitious promises followed by humbling reality checks, each cycle repeating at a larger scale. In the late 1940s and 1950s, Newell and Simon at RAND built programs to solve logic puzzles and tried to create a 'General Problem Solver' — a program that could solve any problem given about five general rules. It didn't work well. So researchers tried fifty rules. Then five hundred. By the 1980s, 'Expert Systems' were encoding thousands of rules extracted from interviews with domain experts. By the time Hamming was writing, some systems were using fifty thousand rules — and still hitting walls. The deeper problem was one Hamming identified clearly: experts don't actually work the way they describe. They draw on unconscious pattern recognition built up over ten or more years of intensive experience. When you ask an expert surgeon to articulate the rules they use, they can only describe their conscious thought — the visible tip of an enormous subconscious iceberg. The rules they report are incomplete, and encoding them in a program produces something that looks like expertise but breaks down in unexpected ways."}, {"heading": "This bottleneck is precisely what deep learning eventually bypassed. Instead of encoding", "body": "human-written rules, neural networks learn statistical patterns directly from enormous datasets — essentially doing what human experts do over years of practice, but computationally and at scale. Modern Large Language Models like GPT-4, Claude, and Gemini are the culmination of this approach: trained on essentially the entire text of the internet, they capture patterns that no human could write down as rules. The rule-writing problem Hamming described was not solved — it was bypassed entirely."}, {"heading": "Hamming's diagnosis was right: you can't extract intelligence by interviewing", "body": "experts. The solution was to stop asking experts for rules and start learning the rules directly from data."}, {"heading": "Games as a Testing Ground — and What Happened Next", "body": "Hamming explains why AI researchers were so focused on games: they provide a clean, well-defined problem with unambiguous success criteria. If a program wins, it won. No ambiguity. When Hamming wrote this in 1997, chess had just delivered a landmark result. IBM's Deep Blue defeated world champion Garry Kasparov that same year in a six-game match — fulfilling a prediction Newell and Simon had made in 1958 (off by about 30 years). Deep Blue worked through brute-force search: it evaluated up to 200 million positions per second, using handcrafted evaluation functions written by grandmasters. It was more calculator than thinker — but it won."}, {"heading": "The more remarkable milestone came later. In 2016, DeepMind's AlphaGo defeated Lee", "body": "Sedol, the world's best Go player, 4-1. This was widely considered a decade ahead of schedule. Go had been thought to be beyond brute-force search — the game tree is too vast — and would require something more like human intuition. AlphaGo combined deep neural networks with a search strategy called Monte Carlo Tree Search, and it learned primarily by playing millions of games against itself. Its successor, AlphaZero, went further still. Given only the rules of chess, shogi, and Go — no human game data, no hand-coded strategies — it taught itself all three games from scratch. In four hours it surpassed every human chess player who ever lived. In chess, it played with a style human grandmasters described as alien — sacrificing material in ways no human would consider, for positional advantages that didn't pay off for dozens of moves. It had, in some sense, reinvented the game."}, {"heading": "1950s. Samuel wrote a program that played checkers with weighted evaluation functions", "body": "— how much to value center control, piece mobility, king pieces, and so on. Then he made two copies and had them play each other. The winner's weights were kept; the loser's were discarded. Repeat. The program gradually improved until it could beat the Connecticut State checker champion. Hamming asks: is that learning? And if you say no, because a human wrote the program that told it how to improve — then isn't that exactly what your geometry teacher did to you? They gave you a program (the course) that told you how to improve. You entered not knowing how to prove theorems; you left knowing how. The machine did the same."}, {"heading": "This question scales dramatically with modern AI. Today's reinforcement learning from", "body": "human feedback (RLHF), used to train systems like ChatGPT, is Samuel's idea extended across billions of parameters and hundreds of millions of training examples. The system learns from outcomes, adjusting its weights to produce responses humans rate more highly. Is that learning? By any reasonable functional definition — yes. Whether it involves understanding, consciousness, or genuine comprehension remains an open and deeply contested question."}, {"heading": "The Turing Test: Passed, Sort Of", "body": "Hamming discusses Alan Turing's famous test: if a human can't tell whether they're conversing with a person or a machine, the machine can be said to be 'thinking.' Hamming was skeptical of it as a rigorous test, preferring to ask what the smallest believably-thinking program would look like. After a year of nightly contemplation he decided that was the wrong question — perhaps 'thinking' isn't a yes-or-no property but a matter of degree. That instinct has proved prescient. In 2024, researchers at UC San Diego ran a rigorous version of the Turing Test with GPT-4.5. When given a persona instructed to use casual language, hedging, and occasional typos, GPT-4.5 was identified as human 76% of the time — better than actual humans in the same study. Meta's LLaMA 3.1 also passed in similar conditions. But passing the Turing Test has not settled the debate about whether machines 'think.' Most researchers now view it as a test of behavioral mimicry, not inner experience. An AI that passes the Turing Test is a masterful pattern-matcher trained on the entire corpus of human text — it produces responses that look like thinking, but whether anything 'like' the experience of thinking accompanies those outputs remains unknown and possibly unknowable. Hamming's preferred question — to what degree? — is exactly where the scientific frontier sits today. Hamming's conclusion in 1997: thinking is probably not a yes-or-no thing, but a matter of degree."}, {"heading": "The scientific consensus in 2025: still unresolved — but behavioral benchmarks", "body": "once thought impossible are falling one by one."}, {"heading": "The Vitalism Parallel — and Why It Matters Now", "body": "Hamming draws a beautiful analogy to the history of chemistry. Until the early 1800s, most chemists believed organic compounds — molecules produced by living things — could only be made by living things. There was something special about life that chemistry couldn't replicate. Then in 1823, Friedrich Wöhler synthesized urea in a test tube. The vitalistic theory of chemistry collapsed over the following decades. Today, chemists believe in principle any compound the body makes can also be made in a lab. Hamming applies the same arc to AI. There was once a widespread belief that human intelligence had a vital quality that machines could never replicate — call it a soul, consciousness, qualia, or just the je ne sais quoi of being human. Each time AI failed to achieve something (chess, Go, creative writing, medical diagnosis), that failure was taken as evidence of the vital gap. Each time AI succeeded, the goalposts moved — 'well, that's not really thinking.' We are arguably in a Wöhler moment right now. Large language models write poetry, explain quantum mechanics, pass bar exams, and generate original code. The debate about what constitutes 'real' intelligence is still alive — but the list of things machines demonstrably cannot do is shrinking fast. Whether the gap will ever close to zero, or whether there is some irreducible human quality that remains, is the defining question of our technological era."}, {"heading": "What Hamming Got Right — and What He Couldn't Have Seen", "body": "Looking back from 2025, Hamming's analysis in 1997 is remarkable for what it got right. He correctly identified that rule-based AI would hit a wall. He correctly predicted that AI would eventually deliver on its promises but that the timeline would slip repeatedly. He correctly saw that the question of machine thinking was more a matter of degree than a binary yes/no. And he correctly warned that you can't afford to dismiss AI — but you also can't uncritically embrace it. What he couldn't have seen: the neural network revolution. Deep learning, transformers, and large language models represent a fundamentally different approach to AI than anything Hamming was analyzing. Instead of encoding knowledge as rules, these systems encode it as statistical weights in billions of parameters — a form of memory that resists easy inspection or verbal description, much like human expertise. The current limitations — hallucination (confidently wrong answers), lack of true reasoning, inability to reliably verify their own outputs, and uncertain relationship to 'understanding' — echo Hamming's skepticism about whether we truly understand what we've built. As he said of his own invention of error-correcting codes: 'I do not understand what I invented as clearly as he does.' The same may be true of the researchers who built today's AI systems."}],
  },
  7: {
    emoji: '🧠',
    title: 'Artificial Intelligence — Part II',
    elem: [{"heading": "The Art of Doing Science and Engineering", "body": "Are Computers and Brains That Different? Your brain is made of tiny cells that send little sparks of electricity to each other. Computers are also made of tiny parts that use electricity. A scientist named Richard Hamming noticed that both brains and computers are made of the same basic stuff — atoms — just arranged in different ways. He said: maybe thinking comes from the way things are organized, not just what they're made of. After all, an airplane doesn't have feathers like a bird, but it can still fly — even faster and higher than any bird!"}, {"heading": "Cool Things Computers Could Already Do", "body": "Scientists built programs that did amazing things. One figured out a math proof in a clever way that even the people who built it didn't expect! Another program played checkers so well it beat the state champion — and it had learned from playing lots of games, just like you get better at games the more you practice. Scientists at Bell Labs even made computers create music — not by recording real musicians, but by calculating every single sound mathematically. By the 1990s, the best recordings in the world were made by computers. Hamming said there was nothing left to improve in music technology — only deciding what music to make!"}, {"heading": "What Robots Are Good At — and Not So Good At", "body": "Robots were already building cars and computer chips in the 1990s. They could do the same job perfectly, over and over, without getting tired or bored. But if something unexpected happened — like a part falling on the floor — they would get confused. Hamming said robots work best when everything goes according to plan. When something goes wrong, humans are still much better at figuring out what to do. What Does It Really Mean to Think? Hamming ended the chapter with a big question: what IS thinking, anyway? He noticed that when a kid learns to multiply for the first time, it feels like real thinking. When a grown-up does the same problem quickly, it feels more like habit. When a computer does it, it doesn't feel like thinking at all — even though they all get the same answer! Hamming wondered: maybe we should pay attention to HOW something is done, not just WHAT the answer is."}],
    middle: [{"heading": "The Art of Doing Science and Engineering", "body": "Humans and Computers: More Alike Than You Think? Here's a surprising fact: you and a computer are both made of atoms. Your brain uses tiny cells called neurons that send electrical signals to each other. A computer uses tiny switches that flip on and off using electricity. Neither an atom in your brain nor a transistor in a chip can think on its own. But put billions of them together in the right arrangement — and something new can appear. Richard Hamming compared this to friction: single molecules don't have friction, but large collections of them do. Maybe thinking works the same way. Airplanes don't copy birds — they use fixed wings and fly much faster and higher. Nature never invented the wheel, but we use wheels everywhere. We don't need to copy the brain exactly to build something that thinks."}, {"heading": "Things AI Could Already Do in Hamming's Time", "body": "In the 1950s, 60s, and 70s, AI researchers built programs that surprised even their creators. One program proved a geometry theorem in a way nobody had thought of — instead of drawing helper lines, it noticed that an isosceles triangle is a mirror image of itself and proved the angles had to match. Mathematicians said it was 'elegant.' A checker-playing program learned from its own games and eventually beat the State Checker Champion. A 1961 program solved calculus integration problems as well as the average college student. Hamming noticed a strange pattern: every time a computer did something impressive, people immediately said 'that's just a trick, not real thinking.' But Hamming asked: how do you know YOUR thinking isn't just a very complicated trick?"}, {"heading": "Computers also helped with music. Scientists at Bell Labs calculated sound waves", "body": "mathematically and created music without any human musicians. They even had computers compose the notes using rules of music theory. By the 1990s, digital recording had become the highest-quality format — and Hamming said that was the endpoint for music technology. What remained was only the question of what music was worth making, not how to make it."}, {"heading": "Robots and the Limits of Machines", "body": "By the 1990s, robots were building cars and assembling computer chips — jobs too detailed for any human to do reliably by hand. But robots had a big weakness: they only worked well when everything went according to plan. If something unexpected happened — a part fell on the floor, a pipe burst — the robot would either freeze up or make things worse. Hamming said: a 'routine response to a non-routine situation can spell disaster.' Chess machines were getting better by examining millions of possible moves every second — far more than any human. But Hamming pointed out they were winning by brute force, not by understanding the game the way a great player does. 'We started playing games on computers to study how humans think,' he wrote, 'but the goal got twisted into just winning — never mind understanding the human mind.'"}, {"heading": "Hamming made an important distinction. Logical novelty means something truly new —", "body": "something that couldn't have been predicted from what came before. Psychological novelty means something that surprises us, even if it was technically always hiding in the rules. Machines produce psychological novelty all the time — programmers are constantly surprised by their own programs. But do humans produce logical novelty? Hamming thought the honest answer might be: not as often as we like to believe. Hamming's big idea at the end: maybe thinking isn't about WHAT you do, but HOW you do it. A kid learning to multiply feels like they're thinking. An adult doing the same problem feels like habit. A machine doing it feels like neither. Maybe we've been measuring the wrong thing all along."}],
    high: [{"heading": "Same Atoms, Different Arrangements", "body": "Hamming begins this chapter by pointing out something easy to overlook: both humans and machines are built from the same periodic table. Atoms of carbon, hydrogen, oxygen, and nitrogen make up neurons; silicon, copper, and other elements make up circuits. At the molecular level, neither humans nor computers 'think.' Yet from large, organized collections of non-thinking molecules, thinking — or something that looks remarkably like it — can emerge. Hamming compares this to friction: no friction exists between individual molecules, yet large structures made of those same molecules show friction clearly. Organization produces effects that the individual parts do not possess. Key insight: 'From large organizations new effects can arise.' The same principle that produces friction from frictionless molecules may produce thinking from non-thinking parts. We simply cannot rule it out. He reinforces this with engineering examples. Airplanes don't flap wings like birds — they use fixed wings and fly far higher and faster than any bird. Nature never invented the wheel, yet wheels drive nearly every machine we rely on. When engineers build something to do what nature does, they do it differently and often better. This principle applies to building 'thinking' machines: we don't need to copy the brain exactly to achieve something functionally equivalent."}, {"heading": "What AI Had Already Accomplished", "body": "Hamming surveys the actual achievements of AI research up to the 1990s. A geometry theorem-proving program took the classic isosceles triangle problem — 'if two sides of a triangle are equal, the base angles are equal' — and proved it without drawing any construction lines at all. Instead, it compared triangle ABC with triangle CBA and proved the triangle is congruent to its own mirror image, so the angles must match. This proof, unknown to the program's designers, is actually a footnote in Euclid. Human mathematicians called it elegant. Hamming asks: did the machine show genuine originality, or did the designers accidentally program it in through the rules they gave the program? Samuel's checker program 'learned' from experience — it got better the more it played — and eventually beat the State Checker Champion. The same paradox applies: once a machine does something impressive, we immediately reclassify that thing as 'just a rote process.' The goalposts for what counts as 'real' intelligence keep moving. Other AI milestones Hamming describes: a formal differentiation program written in 1953 that computed higher-order derivatives for power series; Slagle's 1961 MIT thesis program that solved first-year calculus integration problems as well as the average MIT undergraduate; chemical synthesis programs that map out every possible route to building a compound, with costs and yields; and medical blood-analysis systems more accurate and faster than a human with a microscope."}, {"heading": "Computer Music: Bell Labs and Beyond", "body": "Among the most striking examples in the chapter is computer-generated music. At Bell"}, {"heading": "Telephone Laboratories, Hamming watched Max Mathews and John Pierce build systems", "body": "that computed music mathematically — calculating the amplitude of a sound wave at each moment in time, writing those numbers to tape, and playing them back through a filter. A pure tone is just a sine wave; an instrument is a combination of frequencies with specific attack and decay characteristics. Once you can simulate any instrument, you can supply notes — or let the computer choose notes from composition rules — and produce music that no human musician ever performed. Hamming notes that by the 1990s, digital recording had made computers the technically perfect medium for music. The highest-quality recordings are digital. There is no future technical improvement to make — only choices about what sounds are worth producing. Composers using computer setups can hear their work immediately rather than waiting years for a first performance, dramatically accelerating their creative development. This is the kind of AI Hamming says he cares most about: not man versus machine, but man and machine achieving together what neither could alone."}, {"heading": "Robots, Chess, and the Limits of Brute Force", "body": "Robots had by the 1990s taken over many manufacturing production lines — computers assembled by robots, chip layouts designed by computer programs that no human could manually verify across a million transistors. But Hamming notes their limits sharply: robots work well in restricted, predictable environments. When something unexpected happens — an object falls on the floor, a component arrives out of position — simple robots fail. A routine response to a non-routine situation can be disastrous. Hamming suggests that machines doing equivalent jobs, not identical ones, is the right engineering frame: a naval robot moving on ceiling rails avoids floor obstacles entirely."}, {"heading": "On chess: machines examine millions of board positions per second; human", "body": "grandmasters examine maybe 50-100 before moving. The machines were winning not through insight but through volume. Hamming's observation: 'We started to play games on computers to study the human thought process — and not to win the game; the goal has been perverted to win, and never mind the insight into the human mind.'"}, {"heading": "Logical vs. Psychological Novelty", "body": "Hamming introduces a distinction that cuts to the heart of the AI debate. Logical novelty means something genuinely new — not derivable from what was already known. Psychological novelty means something surprising to a human mind, even if it was technically implicit in existing knowledge all along. Machines, Hamming argues, produce psychological novelty constantly — programmers are regularly stunned by what their own programs do. But do they produce logical novelty? Can humans produce logical novelty? A careful look at most 'discoveries' shows they were shaped by prior experience, culture, and circumstance. We may flatter ourselves more than the evidence warrants. All of mathematics, Hamming points out, is technically only psychologically novel once you accept the axioms and rules of logic. Every theorem is implicit in the definitions — we just hadn't worked out the path yet. This doesn't make mathematics trivial. It makes the logical/psychological distinction one of the deepest questions in the philosophy of mind."}, {"heading": "Free Will, Molecules, and the Measure of Thinking", "body": "Hamming closes by wrestling with the hardest question. If we are 'just' molecules interacting under physical laws, then our choices were always determined by prior states of matter. Free will as most people imagine it — a self that genuinely chooses independently of prior causes — may be an illusion. Yet we all live as if we have free will; teachers assume the right words will make a student understand; parents assume their choices shape their children. No experiment can definitively settle the question. Hamming's final proposal: perhaps thinking should be measured not by what is done but by how it is done. A child learning multiplication feels like they are thinking. An adult doing the same problem feels like conditioned response. A computer feels like neither. We may have confused the output with the process — and that confusion may be the root of most of our disagreements about AI. The chapter ends without resolution — deliberately. Hamming says we simply do not know what thinking is, and the words are not yet definable. The limits of AI applications remain open, but that openness is exactly why AI requires your careful thought and should not be dismissed just because some experts make obviously false claims in either direction."}],
  },
  8: {
    emoji: '🔬',
    title: 'Artificial Intelligence — Part III',
    elem: [{"heading": "A Different Kind of Chapter", "body": "Instead of teaching facts, Chapter 8 asks you a big question: Can machines think? Richard Hamming doesn't tell you the answer — because nobody knows for sure! What he asks is that you think about it carefully and come up with your own reasons. It's not enough to just say 'yes' or 'no.' A good thinker can explain WHY they believe what they believe."}, {"heading": "Things to Think About", "body": "Hamming gives a list of clues to help you decide. For example: a checker-playing computer got better and better through practice — that's a lot like learning! A geometry program came up with a proof that surprised even the scientists who built it. That's a lot like being creative. But does 'looking like' thinking mean it IS thinking? That's the question."}, {"heading": "Hamming's most important question: Whatever you believe — what would change", "body": "your mind? If NOTHING could change your mind, you're not really thinking about it. You're just going with a feeling."}, {"heading": "Machines Already Help Keep Us Safe", "body": "Some people say they don't want machines running their lives. But Hamming pointed out that machines already help keep us safe every day: pacemakers keep hearts beating, hospital computers watch over sick patients all night, and airplanes use computers to stay balanced in the sky. We don't always notice the machines helping us — but they're there. What Could Computers Do in YOUR Future? Hamming ended with a fun challenge: think about what you want to do when you grow up. Now imagine how computers might change that job in the future. What could you do WITH a computer that you couldn't do alone? Hamming believed the best future wasn't humans OR machines — it was humans AND machines, working together."}],
    middle: [{"heading": "Hamming's Challenge: Argue With Yourself", "body": "In Chapter 8, Richard Hamming does something unusual — he stops giving information and instead gives you a homework assignment: argue with yourself about whether machines can think. He doesn't care what conclusion you reach. He cares that you have real reasons for it, and that you can answer one key question: what would change your mind? If no evidence could ever change your view, then your view isn't really based on reasoning — it's just a feeling you're protecting."}, {"heading": "Nine Things to Think About", "body": "Hamming gives a list of nine starting points for the debate. They're designed to push back against both sides — if you think machines can think, some points challenge you; if you think they can't, other points challenge you. Some highlights from the list: (cid:127) Computers might not have thought YET — that doesn't prove they never can. (cid:127) Wanting machines to think doesn't make it true — wishful thinking is still thinking. (cid:127) Samuel's checker program improved through experience. That looks like learning. (cid:127) The geometry proof was elegant and unexpected. That looks like creativity. (cid:127) Thinking might be a matter of degree — not simply 'yes' or 'no.' (cid:127) Thinking might be about HOW you do something, not WHAT you produce. But I Don't Want Machines Running My Life! The most common protest Hamming heard from students was: 'I wouldn't want my life depending on a machine.' He answered gently but firmly: it already does. Pacemakers keep people's hearts beating. Airplane autopilots keep planes stable — human pilots couldn't handle modern jets alone. Hospital machines monitor heartbeats and blood pressure around the clock. Traffic lights control when you cross the street. The discomfort people feel isn't really about safety. It's about something feeling less human — and that's worth examining honestly."}, {"heading": "Hamming also noticed that humans and machines often work together better than", "body": "either works alone. The real competition isn't human vs. machine — it's teams that combine both vs. teams that use only one."}, {"heading": "Think About YOUR Future Field", "body": "The second challenge Hamming gives is to think about your own future career — not jobs that exist today, but how computers might change your field ten or twenty years from now. This is harder than it sounds. Most people describe how computers are used today. Hamming wanted people to imagine how the whole field might be done differently — what new things become possible, what old assumptions stop being true. That kind of thinking, he said, is the difference between following the future and shaping it."}],
    high: [{"heading": "A Challenge Before You Read On", "body": "Chapter 8 is unlike most chapters in this book. Hamming doesn't present new technical content — he issues a challenge: stop, close the book, and have a serious argument with yourself about whether machines can think. He explicitly says he doesn't care which side you end up on. What he cares about is that you form a reasoned position, can defend it, and — crucially — can state what evidence would cause you to change your mind. That last requirement is the hallmark of scientific thinking. A belief you hold no matter what isn't a reasoned belief; it's a faith."}, {"heading": "Nine Observations to Guide the Debate", "body": "Hamming offers a structured list of nine points to anchor the discussion, designed so that no matter which side you start on, the list pushes back against you. 1. Just because computers haven't yet been programmed to think doesn't mean they can't — it may mean programmers aren't clever enough yet. 2. Just because you want machines to think doesn't mean they can — it might be wishful thinking. 3."}, {"heading": "Samuel's checker program learned from experience, so machines apparently can", "body": "learn. 4. The geometry program's elegant proof showed originality — perhaps as much as you've ever shown. 5. Try to imagine the smallest possible program that could think. No piece of it could think alone. 6. Remember the distinction between logical and psychological novelty. 7. Whatever your opinion, what evidence would you accept as proving you wrong? 8. Thinking may be a matter of degree, not a yes-or-no question. 9. Thinking may be defined by HOW something is done, not WHAT is done — and AI has mostly ignored that. Points 1 and 2 cancel each other out deliberately — Hamming is showing that both the pro-AI and anti-AI positions can rest on weak foundations if you're not careful. Point 7 is the one that separates honest reasoning from rationalization: if no evidence could change your mind, you're not reasoning — you're defending a prejudice."}, {"heading": "The 'I Don't Want My Life to Depend on a Machine' Objection", "body": "Hamming had run this debate in classrooms for years. The most common opening objection was emotional: 'I don't want my life to depend on a machine.' His response was immediate — are you opposed to pacemakers? By the 1990s, modern aircraft could not be safely flown by human pilots without computer stabilization systems; the plane would tumble. Emergency wards had patients automatically connected to computers that monitored vital signs and alerted nurses faster than any human observer could. Traffic lights are machines controlling your life at every intersection. The plain fact: your life is already often controlled by machines, and sometimes they are essential to keeping you alive. You just don't like being reminded of it. Discomfort with the idea is not an argument against the idea."}, {"heading": "Expert Resistance and the Real Advantages of Machines", "body": "A second class of objection came from experts in various fields who insisted machines could never compete in their domain. Hamming listed the advantages machines actually have over humans — advantages experts tended to dismiss or ignore: economics, speed, accuracy, reliability, rapid response, freedom from boredom, high bandwidth for input and output, ease of retraining, ability to operate in hostile environments, and no personnel problems. Against that list, human advantages look narrow — important in some areas, but rarely where people first assume. Hamming's deeper point was about attitude. Experts cling to their supposed superiority rather than asking: where could this machine actually improve things in my field? The productive question is not 'can a machine replace me?' — it's 'what can a machine and I do together that neither could do alone?' The combination of human and machine judgment is almost always more powerful than either in isolation. Ego is the main obstacle to seeing that clearly."}, {"heading": "Thinking About Your Own Future", "body": "Hamming asks his students to do a second exercise beyond the 'Can machines think?' debate: think concretely about future applications of computers in your own field. Not past or present applications — those are easy to list. The harder, more valuable task is to imagine how your field might be done entirely differently with computer assistance. What assumptions currently limit the field? Which of those assumptions go away with fast, tireless, accurate computational support? Hamming observed that people are often less imaginative about their own field than about others — they're too close to the current conventions. He sometimes wondered whether students would think more boldly about applying computers to a field they knew less well, precisely because they weren't anchored by the existing assumptions. The chapter ends with a call to intellectual honesty over intellectual comfort. Take your current opinion on machine thinking. Express it clearly. Then argue the other side as forcefully as you can. Then come back to your own position. The goal is not to reach the right answer — nobody has it yet — but to hold whatever position you end up with for genuine reasons, not reflexes."}],
  },
  9: {
    emoji: '📐',
    title: 'n-Dimensional Space',
    elem: [{"heading": "The Art of Doing Science and Engineering", "body": "What Is a Dimension?"}, {"heading": "You know three dimensions: left-right, front-back, and up-down. That's how we describe", "body": "where things are in the real world. But in math, you can have as many dimensions as you want! A scientist named Richard Hamming said that when engineers design something complicated — like a car or an airplane — each choice they make is like a new dimension. A car with 50 things to adjust lives in '50-dimensional design space.' We can't picture it, but the math still works!"}, {"heading": "Shapes Get Weird in High Dimensions", "body": "Here's something surprising: a sphere in many dimensions actually gets smaller and smaller, not bigger! In 2D a circle has a medium area. In 3D a sphere has a bit more volume. But add more and more dimensions and the volume starts to shrink — even though the sphere keeps gaining dimensions. It's one of the ways that math in many dimensions completely surprises us. Another surprise: in high dimensions, almost all the 'stuff' inside a sphere is near the outside edge — not in the middle. Hamming said this means the best answer to a design problem is usually found at the extreme edges of the choices, not hidden safely in the middle."}, {"heading": "Different Ways to Measure Distance", "body": "You probably measure distance the normal way — in a straight line. But think about getting around a city with a grid of streets: you can't go diagonally, so you count blocks left-right and up-down separately and add them. That's a different way of measuring distance — and it's just as valid! Hamming showed there are at least three useful ways to measure distance in math, and picking the right one for your problem really matters."}],
    middle: [{"heading": "The Art of Doing Science and Engineering", "body": "More Than Three Dimensions? Really? You know the three dimensions of everyday life: left-right, forward-back, up-down. But when engineers design something complicated — like an airplane or a phone — they have to choose dozens or hundreds of different settings. Each setting is like an extra dimension in a mathematical 'design space.' Richard Hamming realized that understanding how this high-dimensional space behaves is essential to doing good engineering. The problem: high-dimensional space is deeply weird, and our instincts about it are almost always wrong. Here's a real-world hint that we often reduce dimensions: fish looking for mates don't wander randomly in the ocean's full 3D volume — they'd almost never find each other. Instead they go to the surface, the bottom, or a specific location. They collapse to 2D. We do the same thing in daily life without realizing it."}, {"heading": "The Shrinking Sphere: A Bizarre Result", "body": "In 2D, a circle with radius 1 has area p » 3.14. In 3D, a sphere with radius 1 has volume 4p/3 » 4.19. As you add more dimensions, the 'volume' of a unit sphere keeps growing... but only up to about 5 dimensions. After that it starts shrinking, and eventually approaches zero. In 10 dimensions the volume is about 2.55 — less than the 2D circle. Keep going and it approaches zero. Even stranger: in high dimensions, almost ALL the volume of a sphere is packed near its surface, not in the middle. In 3D, 7/8 of a sphere's volume is in the outer half. In 100 dimensions, virtually everything is at the skin — the inside is almost empty. For engineers this means: the best design is almost always at an extreme — pushing one or more settings to their limit — not hiding safely in the middle."}, {"heading": "A Cube's Diagonal Goes Perpendicular — and Worse", "body": "In a square, the diagonal makes a 45° angle with every edge. In a 3D cube, the main diagonal makes an angle of about 35° with each edge. As you add more dimensions, that angle keeps shrinking. In 10 dimensions, the diagonal of a hypercube is nearly perpendicular to every edge — even though it connects two corners! And there are over 1,000 such diagonals, all nearly perpendicular to each other. The most mind-bending result: if you pack spheres into the corners of a high-dimensional cube and fit a sphere in the center touching all of them, that inner sphere eventually REACHES OUTSIDE the cube — even though it's touching spheres that are inside it. Hamming's point: if your intuition fails this badly about geometry, it will fail just as badly when you try to search for the best design in a complex system. You need to think carefully about high-dimensional space, not just trust your gut."}, {"heading": "Three Ways to Measure Distance", "body": "You probably know one way to measure distance: the straight-line (Pythagorean) method — square the differences, add them up, take the square root. But there are other valid ways. The 'Manhattan' method adds up differences without squaring — like counting city blocks. The 'Chebyshev' method only looks at the single biggest difference. All three are legitimate 'distances' mathematically. The right choice depends on your problem, and mixing them up can lead you badly astray."}],
    high: [{"heading": "Why a Professor Started Thinking About Extra Dimensions", "body": "When Hamming transitioned from 30 years of research at Bell Labs to a professorship, he did something unusual: he sat back and reflected on every large engineering project he'd worked on. A pattern emerged. Every complex design problem — aircraft, missile guidance, communication systems — involved not three physical dimensions but many. Each independent design parameter adds a dimension to the 'design space.' A car with 50 adjustable parameters lives in 50-dimensional design space, even though the car itself is built in three dimensions. To understand what happens when you search for a good design, you need to understand what high-dimensional space actually looks like — and it is deeply counterintuitive. We think we live in three dimensions, but we often behave as if we live in two. A random walk in 2D brings you back near where you started reliably — in 3D it doesn't. Fish solving the mating problem go to the surface, the bottom, or a fixed location, reducing their search to two dimensions. Truly random three-dimensional flight paths would actually produce fewer airplane collisions than the current system."}, {"heading": "The Volume of a Hypersphere Shrinks to Zero", "body": "Using the Gamma function and a Stirling approximation for n!, Hamming derives the volume of an n-dimensional sphere of radius r. The result is striking: the coefficient C_n peaks around n=5 and then falls steadily toward zero. By n=10, C_n » 2.55, down from a peak of 5.26 at n=5. As n grows without bound, the volume of a unit sphere approaches zero — even though the sphere gets more and more dimensions. Most of the 'space' inside a high-dimensional cube is near the corners, not near the center. Shell theorem: For a sphere of radius r, the fraction of volume in a thin outer shell of relative thickness e is 1 - (1-e)^n. Even for a very thin shell (small e), when n is large, essentially ALL the volume is in the shell. In 3 dimensions, 7/8 of a unit sphere's volume is within the outer half. In 100 dimensions, almost everything is at the surface. Implication for design: the optimal solution is almost certainly on the boundary — at an extreme value of one or more parameters, not nestled safely in the interior. This overturns a common intuition from calculus: we learn to find optima by looking for zero derivatives in the interior. But real engineering design problems almost always have constraints — the feasible region has a boundary — and the optimum is almost always on that boundary, often at a corner. Calculus-style interior optimization is routinely the wrong tool for high-dimensional constrained design."}, {"heading": "Two more results shatter low-dimensional intuition. First: the main diagonal of an", "body": "n-dimensional unit cube runs from the origin to the point (1,1,...,1). The cosine of the angle between this diagonal and any coordinate axis is 1/(cid:214)n — which approaches zero as n grows. In 10 dimensions, the cube's main diagonal is nearly perpendicular to every axis. There are also 2^n such diagonals, all almost mutually perpendicular. The geometry of high-dimensional cubes is nothing like what we picture from looking at a box. The inner sphere paradox: Pack 2^n unit spheres into the corners of a 4×4×...×4 hypercube, one per corner. Place a central sphere touching all of them. In 2D its radius is (cid:214)2 - 1 » 0.41. In 3D it's (cid:214)3 - 1 » 0.73. In n dimensions the radius is (cid:214)n - 1. At n=10, the inner sphere has radius (cid:214)10 - 1 » 2.16 — it extends OUTSIDE the cube, even though it is convex and touches each corner sphere on the inside. High-dimensional geometry is genuinely alien to our intuition."}, {"heading": "Three Distance Metrics and When to Use Each", "body": "All the geometry above used Euclidean (L2) distance: the square root of the sum of squared coordinate differences. But this is not the only valid way to measure distance. Two others matter in practice. The L1 metric (also called Manhattan distance or Hamming distance in the binary case) counts the sum of absolute differences — like navigating a city grid where you can't cut diagonals. The L¥ metric (Chebyshev distance) uses only the largest single coordinate difference, ignoring all others. In L1 geometry, a circle looks like a square balanced on its corner. In L¥ geometry, a circle is a square aligned with the axes. A metric is valid as long as it satisfies four conditions: non-negativity, identity (distance zero only between identical points), symmetry, and the triangle inequality. All three satisfy these. The choice of metric should match the problem: L2 fits physical distance and least-squares data fitting; L¥ fits problems where the worst-case difference on any single dimension is what matters; L1 fits problems where you count differences, as in comparing bit strings. Complex design problems often mix all three."}],
  },
  10: {
    emoji: '🔢',
    title: 'Coding Theory — Part I',
    elem: [{"heading": "Sending Messages with 0s and 1s", "body": "Computers talk to each other using only two symbols: 0 and 1. Every letter, picture, and video you send is turned into a long string of 0s and 1s before it travels. In the late 1940s, a mathematician named Claude Shannon figured out the best way to do this. His key idea: turn every piece of information into 0s and 1s as efficiently as possible — using the fewest bits you can — while still being able to read it back perfectly."}, {"heading": "Common Letters Get Shorter Codes", "body": "Have you ever seen Morse code? The letter E is just one dot — the shortest possible signal — because E shows up in almost every word. The letter Q gets a long code because it's rarely used. This is smart design: make the common things short and the rare things longer. On average, your messages end up much shorter. Coding rule: The more often a symbol appears, the shorter its code should be. This is true whether you're building a Morse code machine or designing computer file formats."}, {"heading": "The Code Must Be Readable Without Confusion", "body": "There's one important rule: the person (or computer) receiving the message must be able to read it back perfectly. If two different messages could look the same after encoding, you have a problem! Shannon and Hamming worked out the math to make sure a good code is always readable — no mix-ups, even when the message is very long."}, {"heading": "Math vs. Real Life", "body": "The math of coding works perfectly for computers. But Hamming pointed out something interesting at the end of the chapter: people don't communicate like computers. When you explain something to a friend, they don't just receive your exact words. They use everything they already know to figure out what you meant. The same words can mean different things to different people. Math is a great tool — but people are more complicated than a code!"}],
    middle: [{"heading": "The Problem of Sending Information", "body": "Every time you send a text, stream a video, or save a file, information is being encoded, transmitted, and decoded. In the late 1940s, a mathematician named Claude Shannon built a mathematical theory of how to do this efficiently. His big idea: don't worry about what the message means. Just treat it as a stream of symbols with known probabilities and figure out the most efficient way to represent them as 0s and 1s. Sending through space (a phone call) and storing through time (saving a file) are actually the same problem in disguise. Shannon's system model: Source fi Encode fi Channel (with noise) fi Decode fi Destination. The 'noise' step is where things go wrong — static on a phone call, a scratched CD, a flipped bit in memory. Good coding handles noise gracefully."}, {"heading": "Short Codes for Common Things, Long Codes for Rare Ones", "body": "Morse code has a clever trick: the letter E gets a single dot (the shortest possible code) because it appears all the time in English. The letter Q gets a long code because it's rare. On average, this makes messages shorter. Binary codes work the same way. If you know some symbols appear much more often than others, you can design a code that assigns them shorter bit strings — and the average number of bits per symbol goes down. But there's a catch: you need the receiver to be able to decode the stream correctly without any ambiguity. Hamming shows that the best kind of code — one you can decode symbol by symbol as the bits arrive, without waiting — is never worse than any other kind. So you might as well design for that property from the start."}, {"heading": "The Kraft Inequality: Not All Code Designs Are Possible", "body": "There's a mathematical rule that limits how short you can make your codes. If you have five symbols and want short codes for all of them, you'll run into a problem — they start to look alike and cause confusion. The Kraft inequality captures this: the sum of 2^(-length) for all your symbols must be 1 or less. Too many short symbols pushes the sum over 1, which means there's no valid way to decode the message uniquely. This rule guides the entire design of efficient codes."}, {"heading": "Information Theory vs. Real Communication", "body": "Hamming ends with an honest observation. The math works perfectly for computers — where 0s and 1s mean exactly what the programmer says they mean. But human communication is messier. When you explain something to a friend, the meaning isn't stored inside your words like data in a file. Your friend rebuilds the meaning in their own head using their own experiences. The same sentence can mean different things to different people. The theory is a great model, but it's not the whole story of communication."}],
    high: [{"heading": "Shannon's Big Idea: Separate the Message from the Medium", "body": "In the late 1940s, C.E. Shannon created Information Theory. His key abstraction was elegant: ignore what the information means. Treat any source of symbols — letters, numbers, musical notes, dance notation — as simply a stream of symbols with known probabilities. The theory then tells you the most efficient way to encode and transmit that stream, regardless of the source. Shannon insisted on calling it 'Information Theory' rather than 'Communication Theory,' and that word choice has driven both excitement and confusion ever since: the theory is powerful and general precisely because it strips out meaning, yet people keep wanting it to say something about meaning. The model has five parts: Source fi Encoder fi Channel (with noise) fi Decoder fi"}, {"heading": "Sink. Crucially, transmission through space and storage through time are the same", "body": "problem — both move information from one state to another, with the same risk of corruption. Your hard drive and your phone call face the same theoretical challenge."}, {"heading": "Variable-Length vs. Block Codes", "body": "Morse code is an early example of a variable-length code: common letters (E, T) get short codes, rare ones (Q, Z) get long ones. This reduces the average length of a message. But Morse is actually ternary (dots, dashes, and spaces between letters), not binary. Hamming focuses on binary codes — strings of 0s and 1s — which is what computers use. A block code assigns every symbol the same number of bits. A variable-length code assigns shorter bit strings to more frequent symbols, just as Morse does. The fundamental requirement for a usable code is unique decodability: the receiver must be able to recover the original message unambiguously from the received stream. A stronger property is instantaneous decodability: you can decode each symbol as soon as its last bit arrives, without waiting to see future bits. Hamming shows (via McMillan's Theorem) that instantaneous decodability costs nothing — you can always find an instantaneously decodable code that is just as efficient as the best merely uniquely decodable code. So there's no reason not to require it."}, {"heading": "Decoding Trees and Average Code Length", "body": "An instantaneously decodable binary code can always be represented as a binary tree: at each node you read the next bit (0 = left, 1 = right) and when you reach a leaf you emit the corresponding symbol and return to the root. Each bit is examined exactly once. The design question is: what tree minimizes the average number of bits per symbol? The average code length L = S p_i × l_i, where p_i is the probability of symbol i and l_i is its code length. More frequent symbols should get shorter codes. Example: if symbol probabilities are 1/2, 1/4, 1/8, 1/16, 1/16, then assigning lengths 1, 2, 3, 4, 4 gives average length = 1(1/2) + 2(1/4) + 3(1/8) + 4(1/16) + 4(1/16) = 2.0 bits. If all five symbols are equally likely (prob 1/5 each), the optimal lengths are different. The best code always depends on the actual frequencies in the source."}, {"heading": "The Kraft Inequality: A Limit on Code Lengths", "body": "Not every set of code lengths is achievable. The Kraft inequality states that for any instantaneously decodable binary code, the sum of 2^(-l_i) over all symbols must be £ 1. Too many short codes (small l_i values) would push this sum above 1 — which means there's no valid decoding tree. The inequality can be proved by induction on the tree structure."}, {"heading": "McMillan's Theorem extends it: even non-instantaneous uniquely decodable codes must", "body": "satisfy the same Kraft inequality. So the set of achievable code lengths is identical whether you require instantaneous decodability or just unique decodability. Hamming closes the chapter with a reflection that goes beyond the formalism. Real human communication doesn't fit the model neatly. When you explain an idea to someone, the 'meaning' isn't locked inside your words — the listener reconstructs it using their own background knowledge. Different words can convey the same idea; the same words can be misunderstood completely depending on the listener. The formal model of information theory is highly applicable inside computer systems, but it only partially captures what happens when one person tries to get an idea from their head into someone else's."}],
  },
  11: {
    emoji: '📊',
    title: 'Coding Theory — Part II',
    elem: [{"heading": "Making Messages Shorter: The Huffman Algorithm", "body": "Imagine you're sending text messages and want to use as few symbols as possible. The letters you use a lot — like 'e' and 't' — should get short codes. Letters you rarely use — like 'q' and 'z' — can have longer codes. A man named David Huffman discovered the perfect recipe for doing this. His method always finds the best possible code for any set of symbol probabilities. It's the same idea used in ZIP files that compress documents on your computer! Key rule: The more often a symbol appears, the shorter its code should be. Huffman's algorithm finds the best balance automatically."}, {"heading": "Catching Mistakes: Parity Checks", "body": "When you send a message, sometimes bits get flipped by mistake — a 0 becomes a 1, or a 1 becomes a 0. To catch these mistakes, you can add an extra 'check bit.' This check bit is set so the total count of 1s in the message is always even. If the receiver counts and gets an odd number, they know an error happened! This simple trick is used everywhere — in phones, computers, and storage drives."}, {"heading": "Catching Human Mistakes Too", "body": "Computers make random mistakes. But people tend to make the same kinds of mistakes over and over — like accidentally swapping two letters or digits. Hamming helped design a special code that catches this kind of human error. It gives each symbol a number-value and adds them up in a clever way, so swapping two symbols always gets caught. You can even find this code on the back of books — it's part of the ISBN number!"}],
    middle: [{"heading": "Huffman Coding: Making Messages Shorter", "body": "In Chapter 10 we learned that you can save space by giving shorter codes to symbols that appear more often. David Huffman figured out the exact algorithm to do this optimally — meaning no other code can do better. His trick: look at your list of symbols sorted by probability. The two least common symbols should always be tied for the longest codes. Merge those two into one combined symbol, re-sort the list, and repeat. Keep going until only two symbols are left. Then assign 0 and 1, and work backwards, splitting and assigning bits at each step. Example: five symbols with probabilities 0.4, 0.2, 0.2, 0.1, 0.1. Merge the two 0.1s into a 0.2. Now you have four: 0.4, 0.2, 0.2, 0.2. Merge two of those. Keep going. When done, the most common symbol (0.4 probability) gets a short 1-bit code and rare ones get longer codes. Result: messages that can be more than 50% shorter than a flat block code! Huffman coding works best when some symbols appear a lot more often than others. If all symbols appear equally often, you don't gain much. This is the algorithm behind ZIP files and many other compression tools you use every day."}, {"heading": "Catching Errors: Parity Checks", "body": "Making messages short is source encoding. But what if the message gets corrupted in transit? That's channel encoding — deliberately adding extra bits that help catch (and fix) mistakes. The simplest trick: add one 'parity' bit to every group of bits, chosen so the total number of 1s in the group is always even. If a single bit gets flipped by noise, the count goes odd and the receiver knows something went wrong. Bell Labs telephone switches used a '2-out-of-5' code: every decimal digit was stored as exactly 2 'on' relays out of 5. Any other pattern was instantly recognized as an error. Hamming loved this system — not just because it caught errors, but because every error was flagged right away, making the machines much easier to repair."}, {"heading": "Computers make random errors. Humans make predictable ones. The most common human", "body": "mistake is transposing two adjacent digits — writing '76' when you meant '67.' A regular parity check won't catch this because the same digits are present, just swapped. Hamming designed a special weighted code for AT&T; that multiplies each symbol by its position and adds them up, then checks the total. This catches both single changes AND transpositions — as long as the modulus is a prime number. You've seen this code before: it's the system used in ISBN book numbers."}],
    high: [{"heading": "Huffman Coding: The Optimal Compression Algorithm", "body": "David Huffman solved the problem of finding the minimum average code length for any set of symbols with known probabilities. His insight began with two simple inequalities: if symbols are ordered by decreasing probability, then their code lengths must be in increasing order, and the two least-probable symbols must share the same (longest) length. Any violation of either property allows you to swap codes and reduce the average length — so they must hold for any optimal code."}, {"heading": "The Huffman algorithm: repeatedly merge the two lowest-probability symbols into a", "body": "single combined symbol, building a tree from the bottom up. When only two symbols remain, assign them 0 and 1. Then unwind: at each split, append a 0 to one branch and a 1 to the other. The result is provably optimal — no other uniquely decodable code can achieve a shorter average length. The code is not unique (the 0/1 assignment at each split is arbitrary) but the average length L is unique. Huffman coding pays off significantly when the probabilities are very unequal — one symbol might appear 40% of the time while others appear only 10%. When all symbols are equally likely, Huffman produces the same result as a flat block code. The savings can be dramatic: Hamming notes that Huffman compression has been known to save more than half the storage space on backup archives. Modern file compression formats like ZIP and DEFLATE are built on Huffman coding at their core."}, {"heading": "Error Detection: Parity Checks", "body": "Source encoding squeezes messages to be as short as possible. Channel encoding does the opposite — it deliberately adds redundant bits so that errors introduced by noise can be detected or corrected. The simplest tool is the parity check: attach one extra bit to every block of n-1 bits, chosen to make the total number of 1s in the block even. Any single error (or any odd number of errors
